# =============================================================================
# MMS Enricher — Name Dictionary
# Maps raw database column names → business names + descriptions
# =============================================================================

tables:
  - raw_name: "aircraft"
    business_name: "Aircraft Fleet Register"
    description: "Master record of every aircraft in the airline's fleet"
    columns:
      - raw_name: "aircraft_id"
        business_name: "Aircraft Identifier"
        description: "System-generated UUID, internal key for all FK references"
      - raw_name: "tail_number"
        business_name: "Tail Number / Registration"
        description: "Aircraft registration mark displayed on fuselage"
      - raw_name: "model_id"
        business_name: "Aircraft Model"
        description: "FK to aircraft model definition (e.g. A320-251N)"
      - raw_name: "status"
        business_name: "Operational Status"
        description: "Current airworthiness and availability state"
      - raw_name: "manufacturer_serial_number"
        business_name: "MSN (Manufacturer Serial Number)"
        description: "OEM-assigned serial number, unique for life of airframe"
      - raw_name: "current_station_id"
        business_name: "Current Station"
        description: "Airport or base where the aircraft is positioned"
      - raw_name: "ownership_type"
        business_name: "Ownership Type"
        description: "OWNED, LEASED_OPERATING, LEASED_FINANCE"
      - raw_name: "delivery_date"
        business_name: "Delivery Date"
        description: "Date aircraft was delivered to the airline"
      - raw_name: "total_flight_hours"
        business_name: "Aircraft Total Flight Hours"
        description: "Total flight hours accumulated since manufacture"

  - raw_name: "maintenance_visit"
    business_name: "Maintenance Visit Record"
    description: "Each row represents one scheduled or unscheduled maintenance visit"
    columns:
      - raw_name: "visit_id"
        business_name: "Visit Identifier"
        description: "UUID primary key for maintenance visit"
      - raw_name: "visit_reference"
        business_name: "Visit Reference Number"
        description: "Human-readable code: MV-2026-0001"
      - raw_name: "aircraft_id"
        business_name: "Aircraft"
        description: "FK to the aircraft being maintained"
      - raw_name: "check_package_id"
        business_name: "Check Package"
        description: "FK to the check package defining task scope"
      - raw_name: "check_type"
        business_name: "Check Type"
        description: "A_CHECK, B_CHECK, C_CHECK, D_CHECK, PHASED, UNSCHEDULED"
      - raw_name: "visit_type"
        business_name: "Visit Type"
        description: "SCHEDULED or UNSCHEDULED"
      - raw_name: "status"
        business_name: "Visit Status"
        description: "PLANNED, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED"
      - raw_name: "planned_start_date"
        business_name: "Planned Start Date"
        description: "Scheduled date for aircraft to enter hangar"
      - raw_name: "planned_end_date"
        business_name: "Planned End Date"
        description: "Scheduled date for aircraft to exit hangar"
      - raw_name: "actual_start_date"
        business_name: "Actual Start Date"
        description: "Actual date aircraft entered hangar (nullable until started)"
      - raw_name: "actual_end_date"
        business_name: "Actual End Date"
        description: "Actual date aircraft exited hangar (nullable until completed)"
      - raw_name: "station_id"
        business_name: "Maintenance Station"
        description: "FK to the hangar station performing the work"
      - raw_name: "total_estimated_hours"
        business_name: "Total Estimated Man-Hours"
        description: "Sum of estimated hours from all tasks in the check package"
      - raw_name: "total_actual_hours"
        business_name: "Total Actual Man-Hours"
        description: "Sum of actual hours logged across all task cards"
      - raw_name: "findings_count"
        business_name: "Findings Count"
        description: "Number of unexpected defects discovered during visit"

  - raw_name: "task_card"
    business_name: "Task Card Record"
    description: "Individual executable task instance within a maintenance visit"
    columns:
      - raw_name: "task_card_id"
        business_name: "Task Card Identifier"
        description: "UUID primary key"
      - raw_name: "card_reference"
        business_name: "Task Card Reference"
        description: "Human-readable ref: TC-MV-2026-0001-003"
      - raw_name: "visit_id"
        business_name: "Maintenance Visit"
        description: "FK to the parent maintenance visit"
      - raw_name: "task_id"
        business_name: "Maintenance Task"
        description: "FK to the task definition from the check package"
      - raw_name: "status"
        business_name: "Task Status"
        enum_values: ["PENDING", "IN_PROGRESS", "COMPLETED", "DEFERRED", "SKIPPED"]
      - raw_name: "assigned_mechanic_id"
        business_name: "Assigned Mechanic"
        description: "FK to mechanic assigned to perform this task"
      - raw_name: "actual_start_time"
        business_name: "Actual Start Time"
        description: "Timestamp when mechanic started work"
      - raw_name: "actual_end_time"
        business_name: "Actual End Time"
        description: "Timestamp when mechanic completed work"
      - raw_name: "actual_man_hours"
        business_name: "Actual Man-Hours"
        description: "Actual labor hours recorded against this task"
      - raw_name: "findings_description"
        business_name: "Findings Description"
        description: "Description of any unexpected defects found"
      - raw_name: "sign_off_mechanic_id"
        business_name: "Sign-Off Mechanic"
        description: "Mechanic who signed off the completed work"
      - raw_name: "inspector_id"
        business_name: "Inspector"
        description: "Independent inspector who reviewed the work"
      - raw_name: "inspector_sign_off"
        business_name: "Inspector Sign-Off Timestamp"
        description: "When the independent inspector approved the work"

  - raw_name: "life_limited_part"
    business_name: "Life-Limited Part Register"
    description: "Every LLP tracked by serial number with remaining life"
    columns:
      - raw_name: "llp_id"
        business_name: "LLP Identifier"
        description: "UUID primary key"
      - raw_name: "part_master_id"
        business_name: "Part Master"
        description: "FK to part catalog entry"
      - raw_name: "part_serial_number"
        business_name: "Part Serial Number"
        description: "OEM-stamped serial number, unique per physical part"
      - raw_name: "aircraft_id"
        business_name: "Installed Aircraft"
        description: "FK to aircraft this LLP is currently installed on"
      - raw_name: "installation_position"
        business_name: "Installation Position"
        description: "Position on aircraft (e.g. ENG1, ENG2, LG_LEFT)"
      - raw_name: "installation_date"
        business_name: "Installation Date"
        description: "When this LLP was last installed"
      - raw_name: "total_life_limit"
        business_name: "Total Life Limit"
        description: "Maximum permitted life (cycles/hours/days) before mandatory removal"
      - raw_name: "life_unit"
        business_name: "Life Unit"
        enum_values: ["FLIGHT_CYCLES", "FLIGHT_HOURS", "CALENDAR_DAYS"]
      - raw_name: "remaining_life"
        business_name: "Remaining Life"
        description: "Cycles/hours/days remaining before mandatory removal"
      - raw_name: "life_consumed_pct"
        business_name: "Life Consumed Percentage"
        description: "Generated: ((total - remaining) / total) * 100"
      - raw_name: "status"
        business_name: "LLP Status"
        enum_values: ["SERVICEABLE", "WARNING", "CRITICAL", "EXPIRED", "REMOVED"]

  - raw_name: "rotable_component"
    business_name: "Rotable Component Pool"
    description: "Serialized high-value components tracked through lifecycle"
    columns:
      - raw_name: "component_id"
        business_name: "Component Identifier"
        description: "UUID primary key"
      - raw_name: "part_master_id"
        business_name: "Part Master"
        description: "FK to part catalog"
      - raw_name: "serial_number"
        business_name: "Component Serial Number"
        description: "OEM serial number, unique per physical part"
      - raw_name: "status"
        business_name: "Component Status"
        enum_values: ["SERVICEABLE", "UNSERVICEABLE", "IN_REPAIR", "QUARANTINED", "INSTALLED_ON_AC", "SCRAPPED"]
      - raw_name: "current_aircraft_id"
        business_name: "Currently Installed On"
        description: "FK to aircraft if currently installed (null if in pool)"
      - raw_name: "current_station_id"
        business_name: "Current Location"
        description: "Physical location (hangar, warehouse, station store)"
      - raw_name: "total_tsn"
        business_name: "Total Time Since New"
        description: "Total flight hours/cycles since part was new"
      - raw_name: "total_cso"
        business_name: "Total Cycles Since Overhaul"
        description: "Cycles since last overhaul"
      - raw_name: "last_shop_visit_date"
        business_name: "Last Shop Visit Date"
        description: "Date of most recent repair/overhaul"
      - raw_name: "warranty_expiry_date"
        business_name: "Warranty Expiry Date"
        description: "OEM warranty expiration (nullable)"

  - raw_name: "airworthiness_directive"
    business_name: "Airworthiness Directive Register"
    description: "Regulatory directives with compliance tracking per aircraft"
    columns:
      - raw_name: "ad_id"
        business_name: "AD Identifier"
        description: "UUID primary key"
      - raw_name: "ad_number"
        business_name: "AD Number"
        description: "Regulatory reference (e.g. EASA-2024-01234)"
      - raw_name: "authority"
        business_name: "Issuing Authority"
        enum_values: ["EASA", "FAA", "CAAC", "TCCA", "CASA"]
      - raw_name: "title"
        business_name: "AD Title"
        description: "Short description of the required action"
      - raw_name: "issue_date"
        business_name: "Issue Date"
        description: "Date AD was published"
      - raw_name: "compliance_deadline"
        business_name: "Compliance Deadline"
        description: "Latest date by which action must be completed"
      - raw_name: "ad_type"
        business_name: "AD Type"
        enum_values: ["INSPECTION", "MODIFICATION", "REPETITIVE"]
      - raw_name: "status"
        business_name: "AD Status"
        enum_values: ["ACTIVE", "SUPERSEDED", "CANCELLED"]

  - raw_name: "deferred_defect"
    business_name: "Deferred Defect (MEL Item)"
    description: "Defects deferred per MEL provisions with expiry tracking"
    columns:
      - raw_name: "defect_id"
        business_name: "Defect Identifier"
        description: "UUID primary key"
      - raw_name: "aircraft_id"
        business_name: "Aircraft"
        description: "FK to aircraft with the defect"
      - raw_name: "mel_reference"
        business_name: "MEL Reference"
        description: "MEL item number from the approved MMEL"
      - raw_name: "mel_category"
        business_name: "MEL Category"
        enum_values: ["A", "B", "C", "D"]
      - raw_name: "description"
        business_name: "Defect Description"
        description: "Description of the inoperative item"
      - raw_name: "operational_restrictions"
        business_name: "Operational Restrictions"
        description: "Dispatch limitations (e.g. seat must remain empty)"
      - raw_name: "status"
        business_name: "Defect Status"
        enum_values: ["ACTIVE", "EXPIRED", "RECTIFIED", "EXTENDED"]
      - raw_name: "created_date"
        business_name: "Created Date"
        description: "When the defect was deferred"
      - raw_name: "expiry_date"
        business_name: "Expiry Date"
        description: "MEL deadline for rectification"
      - raw_name: "rectified_date"
        business_name: "Rectified Date"
        description: "When the defect was actually fixed"

  - raw_name: "certificate_release"
    business_name: "Certificate of Release to Service"
    description: "Legal document certifying maintenance is complete and airworthy"
    columns:
      - raw_name: "crs_id"
        business_name: "CRS Identifier"
        description: "UUID primary key"
      - raw_name: "visit_id"
        business_name: "Maintenance Visit"
        description: "FK to the completed maintenance visit"
      - raw_name: "crs_number"
        business_name: "CRS Number"
        description: "Formatted reference: CRS-2026-0001"
      - raw_name: "certifying_staff_id"
        business_name: "Certifying Staff"
        description: "FK to authorized certifying staff member"
      - raw_name: "scope_description"
        business_name: "Scope Description"
        description: "Summary of maintenance performed"
      - raw_name: "issued_date"
        business_name: "Issue Date"
        description: "When the CRS was signed"
      - raw_name: "status"
        business_name: "CRS Status"
        enum_values: ["ACTIVE", "SUPERSEDED", "VOID"]

  - raw_name: "mechanic"
    business_name: "Maintenance Mechanic"
    description: "Maintenance personnel with licenses and authorizations"
    columns:
      - raw_name: "mechanic_id"
        business_name: "Mechanic Identifier"
        description: "UUID primary key"
      - raw_name: "employee_number"
        business_name: "Employee Number"
        description: "Company employee ID"
      - raw_name: "first_name"
        business_name: "First Name"
        description: "Mechanic's given name"
      - raw_name: "last_name"
        business_name: "Last Name"
        description: "Mechanic's surname"
      - raw_name: "license_type"
        business_name: "License Type"
        enum_values: ["EASA_PART_66_B1", "EASA_PART_66_B2", "FAA_A_P", "OTHER"]
      - raw_name: "license_number"
        business_name: "License Number"
        description: "Regulatory license reference number"
      - raw_name: "is_certifying_staff"
        business_name: "Is Certifying Staff?"
        description: "Whether this mechanic can issue CRS"
      - raw_name: "employment_status"
        business_name: "Employment Status"
        enum_values: ["ACTIVE", "ON_LEAVE", "TERMINATED"]
      - raw_name: "station_id"
        business_name: "Base Station"
        description: "Home station assignment"

  - raw_name: "hangar"
    business_name: "Hangar Facility"
    description: "Hangar buildings with capacity and capability info"
    columns:
      - raw_name: "hangar_id"
        business_name: "Hangar Identifier"
        description: "UUID primary key"
      - raw_name: "hangar_name"
        business_name: "Hangar Name"
        description: "Hangar designation (e.g. LGW H1, MAN H3)"
      - raw_name: "station_id"
        business_name: "Station"
        description: "FK to the station/airport"
      - raw_name: "max_aircraft_size"
        business_name: "Max Aircraft Size"
        enum_values: ["NARROW_BODY", "WIDE_BODY", "REGIONAL"]
      - raw_name: "total_bays"
        business_name: "Total Bays"
        description: "Number of individual work bays"
